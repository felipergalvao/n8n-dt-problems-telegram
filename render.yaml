services:
  - type: web
    name: n8n-dt-problems-telegram
    plan: free
    region: oregon

    # Puxa a imagem oficial do n8n. Não precisamos de Dockerfile próprio.
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest

    healthCheckPath: /
    autoDeploy: true

    envVars:
      # ===== Porta/host/HTTPS (Render espera que o app escute em 0.0.0.0:$PORT; padrão 10000) =====
      - key: N8N_PORT
        value: "10000"
      - key: PORT
        value: "10000"
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_HOST
        value: n8n-dt-problems-telegram.onrender.com
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-dt-problems-telegram.onrender.com/
      - key: WEBHOOK_URL
        value: https://n8n-dt-problems-telegram.onrender.com/

      # ===== Banco: FORÇA SQLite (evita tentar Postgres) =====
      - key: DB_TYPE
        value: sqlite
      - key: N8N_USER_FOLDER
        value: /home/node/.n8n

      # ===== Segurança/execução =====
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_SECURE_COOKIE
        value: "false"
      - key: EXECUTIONS_PROCESS
        value: own

      # ===== Basic Auth na UI =====
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
