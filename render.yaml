services:
  - type: web
    name: n8n-dt-problems-telegram
    plan: free
    region: oregon

    # Executa a imagem oficial do n8n (não usa seu Dockerfile)
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest

    healthCheckPath: /
    autoDeploy: true

    envVars:
      # Porta/host/HTTPS - fundamentais no Render
      - key: N8N_PORT
        value: "10000"
      - key: PORT
        value: "10000"
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_HOST
        value: n8n-dt-problems-telegram.onrender.com
      - key: WEBHOOK_URL
        value: https://n8n-dt-problems-telegram.onrender.com/
      # URL que a UI do editor usa para se montar e gerar links corretos
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-dt-problems-telegram.onrender.com/

      # CHAVE DE CRIPTO OBRIGATÓRIA (sem isso o n8n pode morrer na inicialização)
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      # Cookies seguros atrás de proxy/https podem exigir ajuste.
      # Se tiver problema de login, mantenha 'false' (o Render faz o TLS).
      - key: N8N_SECURE_COOKIE
        value: "false"

      # Execução no próprio processo (evita modo fila/worker no plano free)
      - key: EXECUTIONS_PROCESS
        value: own

      # Proteção básica (Basic Auth)
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
