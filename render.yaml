services:
  - type: web
    name: n8n-dt-problems-telegram
    plan: free
    region: oregon
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest
    healthCheckPath: /
    autoDeploy: true

    envVars:
      # Render expõe o serviço via HTTPS. Informe ao n8n a URL pública.
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_HOST
        value: n8n-dt-problems-telegram.onrender.com
      - key: WEBHOOK_URL
        value: https://n8n-dt-problems-telegram.onrender.com/

      # Muito importante: casar a porta do n8n com a porta esperada pelo Render (10000).
      - key: N8N_PORT
        value: "10000"

      # Proteção básica
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true

      # Execução em processo próprio (evita problemas de queue/worker no free)
      - key: EXECUTIONS_PROCESS
        value: own
