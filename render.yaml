services:
  - type: web
    name: n8n-dt-problems-telegram-clean
    plan: free
    region: oregon
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest
    healthCheckPath: /
    autoDeploy: true

    envVars:
      # ===== Banco =====
      - key: DB_TYPE
        value: sqlite
      - key: N8N_USER_FOLDER
        value: /home/node/.n8n

      # ===== Porta / URL =====
      - key: N8N_PORT
        value: "10000"
      - key: PORT
        value: "10000"
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_HOST
        value: n8n-dt-problems-telegram-clean.onrender.com
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-dt-problems-telegram-clean.onrender.com/
      - key: WEBHOOK_URL
        value: https://n8n-dt-problems-telegram-clean.onrender.com/

      # ===== Segurança =====
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_SECURE_COOKIE
        value: "false"

      # ===== Execução =====
      - key: EXECUTIONS_PROCESS
        value: own

      # ===== Debug =====
      - key: N8N_LOG_LEVEL
        value: debug
      - key: N8N_LOG_FORMAT
        value: json
